<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi | Web Projesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8; /* Çok açık mavi arka plan */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid #007bff; /* Üstteki mavi şerit */
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .form-label {
            color: #495057;
            font-weight: 500;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Giriş Yap</h2>
        <p class="text-muted">Lütfen bilgilerinizi kontrol edin.</p>
    </div>

    <form action="kontrol.php" method="POST">
        <div class="mb-3">
            <label for="email" class="form-label">E-posta Adresi</label>
            <input type="email" name="email" class="form-control" id="email" placeholder="numara@sakarya.edu.tr" required>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label">Şifre</label>
            <input type="password" name="password" class="form-control" id="password" placeholder="numara" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sisteme Giriş Yap</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="girisSayfasi.html" class="text-decoration-none small text-secondary">← Ana Sayfaya Dön</a>
    </div>
</div>

</body>
</html>
